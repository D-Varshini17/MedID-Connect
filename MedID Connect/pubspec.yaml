name: medid_connect
description: A premium healthcare interoperability Flutter app for Android.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.7
  fl_chart: ^0.69.0
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^17.2.4
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/medid_logo.png
